# Real databases for the DBCube full test suite.
#   docker compose up -d --wait
#
# Ports start at 30045 to avoid collisions with local services:
#   MySQL      → 30045
#   PostgreSQL → 30046
#   MongoDB    → 30047  (single-node replica set: transactions enabled)
#   SQLite     → no service needed; it's the local file fulltest.db

services:
  mysql:
    image: mysql:8
    container_name: dbcube-ex-mysql
    ports:
      - "30045:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dbcube_test
      MYSQL_DATABASE: fulltest
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdbcube_test"]
      interval: 3s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16
    container_name: dbcube-ex-postgres
    ports:
      - "30046:5432"
    environment:
      POSTGRES_PASSWORD: dbcube_test
      POSTGRES_DB: fulltest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 30

  mongo:
    image: mongo:7
    container_name: dbcube-ex-mongo
    ports:
      - "30047:27017"
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      # Initiates the replica set on first check, then just pings
      test: |
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]}).ok }"
      interval: 3s
      timeout: 10s
      retries: 30
